# Voxel Signal Server — Apache WebSocket proxy snippet
#
# Add this inside the <VirtualHost *:443> block for voxel.damnfine.xyz
# (Virtualmin: Server Configuration → Edit Directives)
#
# The signal server binds to 127.0.0.1:8765 (see voxel-signal.service).
# Apache handles TLS and proxies WebSocket connections through.

    # Required modules: mod_proxy, mod_proxy_wstunnel
    # Enable with: a2enmod proxy proxy_wstunnel

    ProxyPreserveHost On

    # WebSocket proxy — both endpoints
    ProxyPass /signal ws://127.0.0.1:8765/signal
    ProxyPassReverse /signal ws://127.0.0.1:8765/signal

    ProxyPass /gossip ws://127.0.0.1:8765/gossip
    ProxyPassReverse /gossip ws://127.0.0.1:8765/gossip

    # Catch-all for plain WS clients that don't use a path
    ProxyPass / ws://127.0.0.1:8765/
    ProxyPassReverse / ws://127.0.0.1:8765/
